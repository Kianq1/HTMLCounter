<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Counter - Kian Pourali</title>
    <link rel="stylesheet" href="Assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="counter">
        <h1 class="title">Simple Counter</h1>
        <span class="value">0</span>
        <button class="reset">
            <img src="Assets/sync.png" class="iconreset">
        </button>
        <div class="drop">
        <button class="settingbutton">Setting<i class="fa fa-gear"></i></button>   
        </div>
        <div class="counterbuttons">
            <button class="counterbutton counterbutton--decrease"><p>--</p></button>
            <button class="counterbutton counterbutton--increase"><p>+</p></button>
        </div>
    </div>

    <script src="Assets/javascript.js"></script>
</body>
</html>
